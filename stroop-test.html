<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Stroop Test | Brainnovation</title>
<meta name="theme-color" content="#0d1420">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --ff-display:'Playfair Display',Georgia,serif;
  --ff-body:'Outfit',system-ui,sans-serif;
  --bg:#0d1420;
  --surface:rgba(255,255,255,0.04);
  --surface-raised:rgba(255,255,255,0.07);
  --text:#E6E7E8;
  --text-dim:rgba(230,231,232,0.52);
  --text-faint:rgba(230,231,232,0.22);
  --teal:#6DCDB8;--blue:#407EC9;--gold:#F1B434;--pink:#E06287;--lb:#8BD3E6;
  --c-red:#E05C5C;--c-blue:#5B9BD5;--c-green:#4DB878;--c-yellow:#E8C84A;
  --r-sm:10px;--r-md:14px;--r-lg:20px;--r-xl:28px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --t-spring:0.45s cubic-bezier(0.34,1.56,0.64,1);
  --t-ease:0.4s cubic-bezier(0.25,0.1,0.25,1);
  --t-out:0.3s cubic-bezier(0.4,0,1,1);
}
html{height:100%;height:-webkit-fill-available;height:100dvh;}
body{
  height:100%;height:-webkit-fill-available;overflow:hidden;
  font-family:var(--ff-body);background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  -webkit-text-size-adjust:100%;text-size-adjust:100%;
  overscroll-behavior:none;user-select:none;-webkit-user-select:none;
  touch-action:pan-x pan-y;-ms-touch-action:pan-x pan-y;
}
body::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:9999;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:256px;
}
.prog-track{position:absolute;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,0.04);z-index:300}
.prog-fill{height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--blue),var(--gold));
  transition:width 0.4s var(--t-ease);position:relative;}
.prog-fill::after{content:'';position:absolute;right:-4px;top:-3px;width:8px;height:8px;
  border-radius:50%;background:#E6E7E8;box-shadow:0 0 10px 3px rgba(230,231,232,0.35);}
.deck{position:relative;width:100%;height:100vh;height:100dvh;overflow:hidden;z-index:1}
.slide{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:calc(var(--safe-top) + 2rem) 1.5rem calc(var(--safe-bot) + 2rem);
  text-align:center;opacity:0;pointer-events:none;z-index:1;
  transform:translateY(28px) scale(0.98);transition:none;}
.slide.active{opacity:1;pointer-events:auto;transform:none;z-index:10}
.slide.entering{will-change:transform,opacity;transition:opacity 0.55s var(--t-ease),transform 0.55s var(--t-ease)}
.slide.exiting-up{will-change:transform,opacity;opacity:0;transform:translateY(-36px) scale(0.97);z-index:5;
  transition:opacity 0.38s var(--t-out),transform 0.38s var(--t-out);}
.slide.exiting-down{will-change:transform,opacity;opacity:0;transform:translateY(36px) scale(0.97);z-index:5;
  transition:opacity 0.38s var(--t-out),transform 0.38s var(--t-out);}
.game-slide{padding:0;justify-content:flex-start;overflow:hidden;}
.slide.active .sg{opacity:0;animation:sgIn 0.5s forwards}
@keyframes sgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.slide.active .sg:nth-child(1){animation-delay:.06s}
.slide.active .sg:nth-child(2){animation-delay:.13s}
.slide.active .sg:nth-child(3){animation-delay:.21s}
.slide.active .sg:nth-child(4){animation-delay:.30s}
.slide.active .sg:nth-child(5){animation-delay:.38s}
.slide.active .sg:nth-child(6){animation-delay:.46s}
button{-webkit-appearance:none;appearance:none;outline:none;touch-action:manipulation;border:none;cursor:pointer;}
button:focus-visible{outline:2px solid var(--teal);outline-offset:3px}

/* ════ HERO ════ */
.hero-inner{position:relative;z-index:2;max-width:600px;width:100%}
.hero-logo{height:38px;width:auto;margin-bottom:2rem;display:block;margin-left:auto;margin-right:auto;}
.hero-title{font-family:var(--ff-display);font-size:clamp(2.8rem,9vw,5.2rem);line-height:1.05;font-weight:400;margin-bottom:1.4rem;}
.hero-title em{font-style:italic;color:var(--teal)}
.hero-sub{font-size:clamp(.9rem,2.5vw,1.05rem);color:var(--text-dim);line-height:1.8;font-weight:300;max-width:420px;margin:0 auto 2.6rem;}
.hero-cta{display:inline-flex;align-items:center;gap:.55rem;padding:.85rem 1.9rem;border-radius:100px;
  background:rgba(230,231,232,.05);border:1px solid rgba(230,231,232,.11);color:var(--text);
  font-family:var(--ff-body);font-size:.84rem;font-weight:500;
  cursor:pointer;touch-action:manipulation;transition:background var(--t-ease),border-color var(--t-ease),transform var(--t-ease);}
.hero-cta:hover{background:rgba(230,231,232,.09);border-color:rgba(230,231,232,.2);transform:translateY(-1px)}
.hero-cta:active{transform:scale(.96)}
.hero-cta svg{transition:transform .3s}.hero-cta:hover svg{transform:translateX(3px)}
.hero-ref{font-size:.64rem;color:var(--text-faint);font-style:italic;margin-top:1.4rem}

/* ════ HOW TO ════ */
.howto-inner{position:relative;z-index:2;max-width:480px;width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;max-height:calc(100dvh - 6rem);scrollbar-width:none;-ms-overflow-style:none;}
.howto-inner::-webkit-scrollbar{display:none}
.howto-label{font-size:.58rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--text-faint);margin-bottom:1rem}
.howto-title{font-family:var(--ff-display);font-size:clamp(1.7rem,5vw,2.4rem);line-height:1.15;font-weight:400;margin-bottom:1.1rem;}
.rules{display:flex;flex-direction:column;gap:.45rem;margin-bottom:1.2rem}
.rule{display:flex;align-items:flex-start;gap:.9rem;padding:.6rem .9rem;
  border:1px solid rgba(255,255,255,.05);border-radius:var(--r-md);background:var(--surface);text-align:left;}
.rule-icon{width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:.85rem;margin-top:.05rem}
.rule-icon.r1{background:rgba(139,211,230,.12);border:1px solid rgba(139,211,230,.22)}
.rule-icon.r2{background:rgba(109,205,184,.12);border:1px solid rgba(109,205,184,.22)}
.rule-icon.r3{background:rgba(241,180,52,.12);border:1px solid rgba(241,180,52,.22)}
.rule-copy{font-size:.82rem;line-height:1.55;color:var(--text-dim);font-weight:300}
.rule-copy ul{list-style:none;margin-top:.45rem;display:flex;flex-direction:column;gap:.3rem;}
.rule-copy ul li{padding-left:1em;position:relative;}
.rule-copy ul li::before{content:'·';position:absolute;left:0;color:var(--text-faint);font-weight:600;}
.rule-copy strong{color:var(--text);font-weight:500}
.howto-btn{display:inline-flex;align-items:center;gap:.55rem;padding:.85rem 1.9rem;border-radius:100px;
  background:rgba(109,205,184,.07);border:1px solid rgba(109,205,184,.2);
  color:var(--teal);font-family:var(--ff-body);font-size:.84rem;font-weight:500;
  cursor:pointer;touch-action:manipulation;transition:background var(--t-ease),border-color var(--t-ease),transform var(--t-ease);}
.howto-btn:hover{background:rgba(109,205,184,.13);border-color:rgba(109,205,184,.35);transform:translateY(-1px)}
.howto-btn:active{transform:scale(.96)}

/* ════ AGE SELECT ════ */
.age-inner{position:relative;z-index:2;max-width:420px;width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;max-height:calc(100dvh - 6rem);scrollbar-width:none;-ms-overflow-style:none;}
.age-inner::-webkit-scrollbar{display:none}
.age-title{font-family:var(--ff-display);font-size:clamp(1.9rem,5.5vw,2.8rem);line-height:1.12;font-weight:400;margin-bottom:.8rem;}
.age-sub{font-size:.88rem;color:var(--text-dim);font-weight:300;line-height:1.7;max-width:360px;margin:0 auto 2rem;}
.age-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;width:100%;margin-bottom:1.6rem;}
.age-btn{
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.3rem;padding:1.1rem .8rem;
  border-radius:var(--r-lg);
  border:1.5px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
  touch-action:manipulation;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:background .15s,border-color .15s,transform .12s,box-shadow .18s;
  font-family:var(--ff-body);min-height:88px;
}
.age-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18);transform:translateY(-1px)}
.age-btn:active{transform:scale(.94)}
.age-btn.selected{border-color:var(--teal);background:rgba(109,205,184,.1);box-shadow:0 0 20px rgba(109,205,184,.15);}
.age-btn-range{font-family:var(--ff-display);font-size:clamp(1.1rem,3.5vw,1.5rem);font-weight:600;color:var(--text);line-height:1;}
.age-btn-label{font-size:.6rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);margin-top:.18rem;}
.age-note{font-size:.68rem;color:var(--text-faint);font-style:italic;margin-bottom:1.6rem;line-height:1.55;max-width:340px;}

/* ════ PHASE CARD ════ */
.pcard-inner{position:relative;z-index:2;max-width:420px;width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;max-height:calc(100dvh - 6rem);scrollbar-width:none;-ms-overflow-style:none;}
.pcard-inner::-webkit-scrollbar{display:none}
.pcard-num{font-size:.58rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--text-faint);margin-bottom:1rem}
.pcard-name{font-family:var(--ff-display);font-size:clamp(2.2rem,7vw,3.4rem);line-height:1.08;font-weight:400;margin-bottom:.7rem;}
.pcard-tagline{font-family:var(--ff-display);font-style:italic;font-size:clamp(.9rem,2.5vw,1.05rem);color:var(--text-dim);margin-bottom:1.8rem;}
.pcard-pills{display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap;margin-bottom:1.1rem}
.pcard-pill{font-size:.65rem;font-weight:500;padding:.28rem .75rem;border-radius:100px;border:1px solid rgba(255,255,255,.07);color:var(--text-dim)}
.pcard-task{width:100%;padding:.85rem 1rem;border-radius:var(--r-md);
  background:var(--surface);border:1px solid rgba(255,255,255,.05);
  text-align:center;margin-bottom:1.8rem;}
.pcard-task-label{font-size:.52rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--text-faint);margin-bottom:.55rem;}
.pcard-task-example{font-family:var(--ff-display);font-size:clamp(1.6rem,5vw,2.2rem);font-weight:600;letter-spacing:.04em;}
.pcard-task-arrow{font-size:.75rem;color:var(--text-faint);margin:.4rem 0;}
.pcard-task-answer{font-size:.78rem;color:var(--text-dim);font-weight:300;letter-spacing:.04em;}
.pcard-bullets{list-style:none;margin:0 auto;text-align:left;display:flex;flex-direction:column;gap:.35rem;margin-bottom:1.5rem;max-width:320px;}
.pcard-bullets li{font-size:.82rem;color:var(--text-dim);font-weight:300;line-height:1.55;padding-left:1.1em;position:relative;}
.pcard-bullets li::before{content:'·';position:absolute;left:0;color:var(--text-faint);font-weight:700;font-size:1rem;}
.pcard-bullets li strong{color:var(--text);font-weight:500;}
.pcard-desc{font-size:.82rem;color:var(--text-dim);margin-bottom:2rem;font-weight:300;max-width:340px;line-height:1.65}
.pcard-btn{display:inline-flex;align-items:center;gap:.55rem;padding:.9rem 2rem;border-radius:100px;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
  color:var(--text);font-family:var(--ff-body);font-size:.84rem;font-weight:500;
  cursor:pointer;touch-action:manipulation;transition:background var(--t-ease),border-color var(--t-ease),transform var(--t-ease);}
.pcard-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18);transform:translateY(-1px)}
.pcard-btn:active{transform:scale(.96)}

/* ════ GAME SCREEN ════ */
.g-bar{
  position:relative;z-index:2;width:100%;
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-top) + .9rem) 1.4rem .5rem;flex-shrink:0;
}
.g-bar-label{font-size:.58rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--text-faint)}
.g-bar-right{display:flex;align-items:center;gap:.6rem}
.g-pill{font-size:.68rem;font-weight:500;padding:.25rem .65rem;
  border-radius:100px;border:1px solid rgba(255,255,255,.07);color:var(--text-dim);}
.g-pill b{color:var(--text);font-weight:600}

/* Trial progress dots */
.trial-dots{
  position:relative;z-index:2;width:100%;
  display:flex;align-items:center;justify-content:center;gap:.28rem;
  padding:.3rem 1.4rem .1rem;flex-shrink:0;
}
.trial-dot{
  width:6px;height:6px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);
  transition:background .2s,border-color .2s,transform .2s;
}
.trial-dot.done-correct{background:var(--teal);border-color:var(--teal);}
.trial-dot.done-error{background:var(--pink);border-color:var(--pink);}
.trial-dot.current{background:rgba(255,255,255,.35);border-color:rgba(255,255,255,.5);transform:scale(1.4);}

/* Stimulus zone - the star of the show */
.stimulus-zone{
  position:relative;z-index:2;flex:1;width:100%;
  display:flex;align-items:center;justify-content:center;
  padding:.5rem 1.4rem;min-height:0;flex-shrink:1;
}
.stimulus-word{
  font-family:var(--ff-display);
  font-size:clamp(3.2rem,14vw,6.5rem);
  font-weight:600;
  letter-spacing:.04em;
  line-height:1;
  /* colour set dynamically via JS */
  transition:opacity .08s;
  text-align:center;
  will-change:opacity;
}
.stimulus-word.flash-correct{animation:stimCorrect .22s ease forwards}
.stimulus-word.flash-error{animation:stimError .28s ease forwards}
@keyframes stimCorrect{0%{opacity:1}40%{opacity:.3}100%{opacity:0}}
@keyframes stimError{0%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}100%{transform:translateX(0);opacity:0}}

/* Feedback flash overlay */
.fb-flash{position:absolute;inset:0;pointer-events:none;z-index:4000;opacity:0}
.fb-flash.hit{background:radial-gradient(ellipse at 50% 40%,rgba(109,205,184,.18) 0%,transparent 65%)}
.fb-flash.miss{background:radial-gradient(ellipse at 50% 40%,rgba(224,98,135,.18) 0%,transparent 65%)}
.fb-flash.fire{opacity:1;animation:fbFade .4s ease forwards}
@keyframes fbFade{0%{opacity:1}100%{opacity:0}}

/* Colour response buttons */
.colour-zone{
  position:relative;z-index:2;width:100%;
  display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;
  padding:.4rem 1rem calc(var(--safe-bot) + .85rem);flex-shrink:0;
}
.colour-btn{
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.2rem;
  min-height:72px;
  border-radius:var(--r-lg);
  border:1.5px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);
  touch-action:manipulation;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:background .12s,border-color .12s,transform .1s,box-shadow .15s;
  font-family:var(--ff-body);
}
.colour-btn:active{transform:scale(.91)}
.colour-btn-swatch{width:22px;height:22px;border-radius:50%;flex-shrink:0;}
.colour-btn-label{font-size:.6rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(230,231,232,0.55);}
.colour-btn[data-c="red"]{border-color:rgba(224,92,92,.3);background:rgba(224,92,92,.07)}
.colour-btn[data-c="blue"]{border-color:rgba(91,155,213,.3);background:rgba(91,155,213,.07)}
.colour-btn[data-c="green"]{border-color:rgba(77,184,120,.3);background:rgba(77,184,120,.07)}
.colour-btn[data-c="yellow"]{border-color:rgba(232,200,74,.3);background:rgba(232,200,74,.07)}
.colour-btn[data-c="red"]:hover{background:rgba(224,92,92,.14);border-color:rgba(224,92,92,.55)}
.colour-btn[data-c="blue"]:hover{background:rgba(91,155,213,.14);border-color:rgba(91,155,213,.55)}
.colour-btn[data-c="green"]:hover{background:rgba(77,184,120,.14);border-color:rgba(77,184,120,.55)}
.colour-btn[data-c="yellow"]:hover{background:rgba(232,200,74,.14);border-color:rgba(232,200,74,.55)}
/* Correct / error flash on buttons */
.colour-btn.btn-correct{animation:btnCorrect .32s ease;border-color:rgba(109,205,184,.8);background:rgba(109,205,184,.18);}
.colour-btn.btn-error{animation:btnError .28s ease;}
@keyframes btnCorrect{0%{transform:scale(.95)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes btnError{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* Streak toast */
.streak-toast{position:absolute;top:22%;left:50%;transform:translateX(-50%);
  font-family:var(--ff-display);font-size:1.3rem;font-weight:600;color:var(--text);
  pointer-events:none;z-index:5000;opacity:0;white-space:nowrap;
  background:rgba(13,20,32,.9);border:1px solid rgba(109,205,184,.45);border-radius:100px;
  padding:.38rem 1.1rem;box-shadow:0 4px 24px rgba(109,205,184,.18);}
.streak-toast.show{animation:streakAnim .9s ease forwards}
@keyframes streakAnim{
  0%{opacity:0;transform:translateX(-50%) translateY(10px) scale(.8)}
  20%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.06)}
  60%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
  85%{opacity:.7;transform:translateX(-50%) translateY(-10px) scale(.93)}
  100%{opacity:0;transform:translateX(-50%) translateY(-20px) scale(.86)}}

/* Countdown */
.countdown-wrap{position:absolute;inset:0;z-index:8000;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;}
.countdown-wrap.on{opacity:1}
.countdown-n{font-family:var(--ff-display);font-size:clamp(5rem,18vw,9rem);font-weight:600;opacity:0;color:#E6E7E8;}
.countdown-n.pop{animation:cntPop .6s cubic-bezier(0.25,0.1,0.25,1) forwards}
@keyframes cntPop{0%{opacity:0;transform:scale(.45)}25%{opacity:1;transform:scale(1.18)}55%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.82)}}

/* Sparks */
.spark{position:absolute;pointer-events:none;z-index:9000;width:5px;height:5px;border-radius:50%;opacity:0;}
.spark.go{animation:sparkGo .65s cubic-bezier(0.25,0.1,0.25,1) forwards}
@keyframes sparkGo{0%{opacity:0;transform:translate(0,0) scale(0)}20%{opacity:1;transform:translate(calc(var(--dx)*.3),calc(var(--dy)*.3)) scale(1)}80%{opacity:.6;transform:translate(var(--dx),var(--dy)) scale(.8)}100%{opacity:0;transform:translate(calc(var(--dx)*1.3),calc(var(--dy)*1.3)) scale(0)}}

/* ════ RESULT SCREEN ════ */
.result-inner{
  position:relative;z-index:2;width:100%;max-width:440px;overflow-y:auto;
  display:flex;flex-direction:column;align-items:center;
  max-height:calc(100vh - 4rem);max-height:calc(100dvh - 4rem);
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  scrollbar-width:none;-ms-overflow-style:none;padding-bottom:.5rem;
}
.result-inner::-webkit-scrollbar{display:none}
.res-eyebrow{font-size:.58rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--text-faint);margin-bottom:1.2rem;}
/* RT bar visualisation */
.rt-bars-wrap{width:100%;margin-bottom:1.3rem;}
.rt-bars-title{font-size:.52rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--text-faint);margin-bottom:.65rem;}
.rt-bar-row{display:flex;align-items:center;gap:.65rem;margin-bottom:.55rem;}
.rt-bar-label{font-size:.62rem;font-weight:500;color:var(--text-dim);width:88px;flex-shrink:0;text-align:right;}
.rt-bar-track{flex:1;height:8px;border-radius:100px;background:rgba(255,255,255,.06);overflow:hidden;position:relative;}
.rt-bar-fill{height:100%;border-radius:100px;transform-origin:left;transform:scaleX(0);transition:transform 1.2s cubic-bezier(0.25,0.1,0.25,1);}
.rt-bar-fill.word{background:var(--lb);}
.rt-bar-fill.colour{background:var(--teal);}
.rt-bar-fill.stroop{background:var(--gold);}
.rt-bar-val{font-size:.62rem;font-weight:600;color:var(--text-dim);width:52px;flex-shrink:0;text-align:left;}

/* Interference score ring */
.score-ring-wrap{position:relative;width:160px;height:160px;flex-shrink:0;margin-bottom:1.1rem}
.score-ring-svg{transform:rotate(-90deg);overflow:visible}
.score-track{fill:none;stroke:rgba(255,255,255,.05);stroke-width:6}
.score-fill{fill:none;stroke-width:6;stroke-linecap:round;
  stroke-dasharray:471.24;stroke-dashoffset:471.24;
  transition:stroke-dashoffset 1.3s cubic-bezier(0.25,0.1,0.25,1) .2s,stroke .4s}
.score-center{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.score-num{font-family:var(--ff-display);font-size:2.2rem;font-weight:600;line-height:1;letter-spacing:-.03em}
.score-unit{font-size:.55rem;color:var(--text-faint);letter-spacing:.08em}
.score-label{font-size:.5rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);margin-top:2px;}
.res-grade-label{font-family:var(--ff-display);font-size:1.45rem;font-weight:600;line-height:1.1;margin-bottom:.25rem;}
.res-grade-sub{font-size:.78rem;color:var(--text-dim);font-weight:300;margin-bottom:1.3rem}
.res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;width:100%;margin-bottom:1.2rem}
.res-stat{background:var(--surface);border:1px solid rgba(255,255,255,.05);border-radius:var(--r-md);padding:.75rem .5rem;text-align:center;}
.res-stat-n{font-family:var(--ff-display);font-size:1.5rem;font-weight:600;line-height:1}
.res-stat-l{font-size:.54rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);margin-top:.22rem}
.res-insight{width:100%;padding:.8rem 1rem;margin-bottom:1.2rem;
  border-left:2px solid var(--teal);background:rgba(109,205,184,.03);text-align:left;}
.res-insight-lbl{font-size:.52rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--teal);margin-bottom:.3rem}
.res-insight-txt{font-size:.79rem;line-height:1.6;color:var(--text-dim);font-weight:300}
/* Benchmark bar */
.pattern-interp{
  width:100%;padding:.8rem 1rem;margin-bottom:1.3rem;
  border-left:2px solid var(--gold);background:rgba(241,180,52,.03);text-align:left;
}
.pattern-interp-lbl{font-size:.52rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.3rem}
.pattern-interp-txt{font-size:.79rem;line-height:1.6;color:var(--text-dim);font-weight:300}
.bench-wrap{width:100%;margin-bottom:1.3rem;}
.bench-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.55rem;}
.bench-title{font-size:.52rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--text-faint)}
.bench-source{font-size:.48rem;color:var(--text-faint);font-style:italic;opacity:.7}
.bench-bar-outer{position:relative;height:8px;border-radius:100px;overflow:visible;margin-bottom:.5rem;
  background:linear-gradient(90deg,rgba(109,205,184,.9) 0%,rgba(109,205,184,.6) 22%,rgba(139,211,230,.5) 44%,rgba(241,180,52,.5) 66%,rgba(224,98,135,.35) 82%,rgba(224,98,135,.55) 100%);}
.bench-ticks{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;pointer-events:none}
.bench-tick{position:absolute;width:1px;height:14px;top:-3px;background:rgba(13,20,32,.8)}
.bench-marker{position:absolute;top:50%;width:18px;height:18px;border-radius:50%;
  border:2.5px solid #0d1420;transform:translate(-50%,-50%) scale(0);
  transition:left 1.1s cubic-bezier(0.34,1.2,0.64,1) .5s,background .4s .5s,transform .5s cubic-bezier(0.34,1.56,0.64,1) .45s;
  z-index:2;box-shadow:0 0 0 4px rgba(255,255,255,.08);}
.bench-marker.placed{transform:translate(-50%,-50%) scale(1)}
.bench-marker::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:1px solid currentColor;opacity:0;animation:markerPulse 2.4s ease-in-out infinite 1.2s;}
@keyframes markerPulse{0%,100%{opacity:0;transform:scale(1)}40%{opacity:.35;transform:scale(1.5)}70%{opacity:0;transform:scale(1.9)}}
.bench-labels{display:flex;position:relative;margin-top:.25rem;height:1.8rem}
.bench-zone-lbl{font-size:.44rem;font-weight:500;color:var(--text-faint);text-align:center;position:absolute;transform:translateX(-50%);white-space:nowrap;letter-spacing:.02em;}
.bench-callout{margin-top:1rem;padding:.7rem .9rem;border-radius:var(--r-md);background:var(--surface);border:1px solid rgba(255,255,255,.06);text-align:left;position:relative;overflow:hidden;}
.bench-callout-zone{font-size:.5rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;margin-bottom:.28rem;transition:color .4s}
.bench-callout-text{font-size:.75rem;line-height:1.55;color:var(--text-dim);font-weight:300}
.res-actions{display:flex;gap:.45rem;justify-content:center;flex-wrap:wrap;width:100%;margin-top:.2rem}
.btn-primary{display:inline-flex;align-items:center;gap:.42rem;padding:.76rem 1.45rem;border-radius:100px;
  background:rgba(109,205,184,.08);border:1px solid rgba(109,205,184,.25);
  color:var(--teal);font-family:var(--ff-body);font-size:.82rem;font-weight:500;
  cursor:pointer;touch-action:manipulation;transition:background var(--t-ease),border-color var(--t-ease),transform var(--t-ease);}
.btn-primary:hover{background:rgba(109,205,184,.14);border-color:rgba(109,205,184,.4);transform:translateY(-1px)}
.btn-primary:active{transform:scale(.96)}
.btn-ghost{display:inline-flex;align-items:center;gap:.42rem;padding:.76rem 1.05rem;border-radius:100px;
  border:1px solid rgba(255,255,255,.08);background:transparent;color:var(--text-dim);
  font-family:var(--ff-body);font-size:.82rem;font-weight:400;
  cursor:pointer;touch-action:manipulation;transition:border-color var(--t-ease),color var(--t-ease),transform var(--t-ease);}
.btn-ghost:hover{border-color:rgba(255,255,255,.15);color:var(--text)}
.btn-ghost:active{transform:scale(.96)}

/* ════ FINAL SCREEN ════ */
.final-inner{position:relative;z-index:2;max-width:500px;width:100%;overflow-y:auto;
  max-height:calc(100vh - 4rem);max-height:calc(100dvh - 4rem);
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  scrollbar-width:none;-ms-overflow-style:none;}
.final-inner::-webkit-scrollbar{display:none}
.final-rule{width:40px;height:1px;background:rgba(255,255,255,.08);margin:0 auto 1.5rem}
.final-title{font-family:var(--ff-display);font-size:clamp(2rem,6vw,3.2rem);line-height:1.1;font-weight:400;margin-bottom:1.2rem;color:var(--text);}
.final-title em{font-style:italic;color:var(--teal)}
/* Interference score display */
.final-interference{text-align:center;margin-bottom:1.4rem;}
.final-ie-num{font-family:var(--ff-display);font-size:clamp(3.5rem,12vw,6rem);font-weight:600;line-height:1;}
.final-ie-unit{font-size:.72rem;color:var(--text-faint);letter-spacing:.15em;text-transform:uppercase;margin-top:.3rem;}
.final-ie-label{font-size:.6rem;color:var(--text-faint);letter-spacing:.12em;text-transform:uppercase;margin-top:.2rem;margin-bottom:1.4rem;}
.final-chips{display:flex;justify-content:center;gap:.4rem;flex-wrap:wrap;margin-bottom:1.4rem}
.chip{font-size:.68rem;font-weight:500;padding:.3rem .85rem;border-radius:100px;border:1px solid rgba(255,255,255,.07);color:var(--text-dim);}
.chip.good{border-color:rgba(109,205,184,.3);color:var(--teal);background:rgba(109,205,184,.08)}
.final-insights{list-style:none;margin-bottom:1.7rem}
.final-insights li{font-size:.88rem;color:var(--text-dim);line-height:1.75;font-weight:300;padding:.18rem 0;border-bottom:1px solid rgba(255,255,255,.05);}
.final-insights li:last-child{border-bottom:none}
/* Session history */
.hist-final-wrap{width:100%;margin-bottom:1.8rem;}
.hist-final-title{font-size:.52rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--text-faint);margin-bottom:.9rem;}
.hist-no-history{font-size:.78rem;color:rgba(230,231,232,0.35);font-weight:300;font-style:italic;text-align:center;padding:.6rem 0;}
.hist-session-row{position:relative;padding:.75rem .9rem;border-radius:var(--r-md);border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,0.03);margin-bottom:.5rem;}
.hist-session-row.is-current{border-color:rgba(109,205,184,.25);background:rgba(109,205,184,.05);}
.hist-session-row.is-current::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;border-radius:2px 0 0 2px;background:var(--teal);}
.hist-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.45rem;}
.hist-row-score{font-family:var(--ff-display);font-size:1.45rem;font-weight:600;line-height:1;}
.hist-row-meta{display:flex;flex-direction:column;align-items:flex-end;gap:.18rem;}
.hist-row-date{font-size:.52rem;color:var(--text-faint);}
.hist-row-tag{font-size:.48rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:.14rem .5rem;border-radius:100px;}
.hist-row-tag.now{background:rgba(109,205,184,.1);color:var(--teal);border:1px solid rgba(109,205,184,.2);}
.hist-row-tag.prev{background:rgba(255,255,255,.04);color:rgba(230,231,232,0.35);border:1px solid rgba(255,255,255,.06);}
.hist-phase-chips{display:flex;gap:.35rem;flex-wrap:wrap;}
.hist-ph-chip{font-size:.6rem;font-weight:500;padding:.2rem .55rem;border-radius:100px;border:1px solid rgba(255,255,255,.07);color:rgba(230,231,232,0.4);}
.hist-ph-chip.good{border-color:rgba(109,205,184,.25);color:var(--teal);background:rgba(109,205,184,.07);}
.hist-trend-badge{display:inline-flex;align-items:center;gap:.3rem;font-size:.6rem;font-weight:600;letter-spacing:.06em;padding:.25rem .7rem;border-radius:100px;border:1px solid rgba(255,255,255,.07);color:rgba(230,231,232,0.4);margin-bottom:.75rem;}
.hist-trend-badge.up{color:var(--teal);border-color:rgba(109,205,184,.2);background:rgba(109,205,184,.05);}
.hist-trend-badge.down{color:var(--pink);border-color:rgba(224,98,135,.2);background:rgba(224,98,135,.05);}
.hist-analysis-wrap{
  width:100%;margin-top:.85rem;
  padding:.75rem .9rem;border-radius:var(--r-md);
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,.06);
  border-left:2px solid var(--teal);
}
.hist-analysis-label{
  font-size:.5rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
  color:var(--teal);margin-bottom:.35rem;
}
.hist-analysis-text{
  font-size:.78rem;line-height:1.6;color:var(--text-dim);font-weight:300;
}
.final-cta{display:inline-flex;align-items:center;gap:.5rem;padding:.9rem 1.8rem;border-radius:100px;
  background:rgba(109,205,184,.08);border:1px solid rgba(109,205,184,.25);
  color:var(--teal);font-family:var(--ff-body);font-size:.9rem;font-weight:500;
  cursor:pointer;touch-action:manipulation;transition:background var(--t-ease),border-color var(--t-ease),transform var(--t-ease);
  text-decoration:none;}
.final-cta:hover{background:rgba(109,205,184,.14);border-color:rgba(109,205,184,.4);transform:translateY(-1px)}
.final-cta:active{transform:scale(.96)}
.final-logo{height:24px;width:auto;opacity:.18;margin-top:1.5rem;display:block;margin-left:auto;margin-right:auto;}

/* ════ ACCESSIBILITY ════ */
@media(prefers-reduced-motion:reduce){
  .slide.entering,.slide.exiting-up,.slide.exiting-down{transition:opacity .18s!important;transform:none!important}
  .slide.active .sg{animation:none!important;opacity:1!important}
  .stimulus-word.flash-correct,.stimulus-word.flash-error{animation:none!important;opacity:0!important}
  .colour-btn.btn-correct,.colour-btn.btn-error{animation:none!important}
  .streak-toast,.countdown-n,.spark{animation:none!important;opacity:0!important}
  .score-fill{transition:stroke-dashoffset .4s,stroke .2s!important}
  .rt-bar-fill{transition:transform .4s!important}
}

// ── TRIAL GENERATION ──
function genTrial(phase){
  const inkKey=COLOUR_KEYS[Math.floor(Math.random()*4)];
  let wordKey;
  if(phase.id==='word'){
    // Phase 1: word and ink always the same (congruent), white ink rendered as text colour
    wordKey=inkKey;
  }else if(phase.id==='colour'){
    // Phase 2: display XXXX, so word is irrelevant
    wordKey=null;
  }else{
    // Phase 3 (Stroop): word and ink ALWAYS different (incongruent)
    // Guarantee mismatch - pick from remaining 3
    const others=COLOUR_KEYS.filter(k=>k!==inkKey);
    wordKey=others[Math.floor(Math.random()*others.length)];
  }
  return{inkKey,wordKey};
}

// ── SCORING UTILITIES ──
// Outlier trimming: exclude RTs < 150ms (anticipatory) and > 3 SDs from individual mean
// (Ulrich & Miller 1994; standard in computerised Stroop research)
function trimRTs(rts){
  if(!rts.length)return rts;
  const mean=rts.reduce((a,b)=>a+b,0)/rts.length;
  const sd=Math.sqrt(rts.map(r=>(r-mean)**2).reduce((a,b)=>a+b,0)/rts.length);
  return rts.filter(r=>r>=150&&r<=mean+3*sd);
}
function meanRT(rts){
  const t=trimRTs(rts);
  return t.length?Math.round(t.reduce((a,b)=>a+b,0)/t.length):0;
}

// Interference Effect (IE) = mean Stroop RT minus mean Colour RT
// This is the ipsative interference score - controls for individual colour-naming speed
// (MacLeod 1991; Perret 1974; standard in computerised Stroop research)
function calcInterference(stroopRTs, colourRTs){
  const ms=meanRT(stroopRTs), mc=meanRT(colourRTs);
  if(!ms||!mc)return 0;
  return Math.max(0,ms-mc);
}

// Map interference score to grade zones
// Based on published Stroop norms:
// Healthy young adults (~20-40): IE ~60-100ms (MacLeod 1991; Frontiers 2014 data)
// Average adults (all ages): IE ~100-180ms
// Elevated interference: IE >180ms
// Low interference: IE <60ms
function scoreGrade(ie){
  // Age-aware norms based on published data:
  // MacLeod (1991), Troyer et al. (2006 Victoria Stroop norms),
  // Frontiers (2014) ERP study, Cansino et al. (2013) lifespan data.
  const band=ageBand||'18to39'; // default to young adult if no selection

  if(band==='u18'){
    // Teen norms: interference still stabilising. Benchmarks not clinically validated
    // for this age group in the same way. Frame developmentally, not clinically.
    if(ie<=80) return{label:'Low Interference',color:'#2d9b84',
      desc:'A Stroop interference effect below 80ms is low for a teenager. The prefrontal inhibitory pathways that suppress automatic word reading are still developing through the mid-20s, so a low score at this age reflects a well-developing system.'}
    if(ie<=150)return{label:'Typical Range',  color:'#4DB878',
      desc:'An interference effect in the 80-150ms range is common in adolescence. The prefrontal cortex is still maturing, and Stroop interference tends to be more variable during this period than in adulthood.'}
    if(ie<=230)return{label:'Above Average',  color:'#b88a1a',
      desc:'An interference effect above 150ms is somewhat elevated for a teen. This may reflect attentional variation, cognitive load, ADHD traits, or simply a day where executive function is lower. The score is not a diagnosis.'}
    return{label:'High Interference',         color:'#c97850',
      desc:'An interference effect above 230ms is high relative to typical adolescent performance. If this pattern repeats across sessions, it may be worth discussing with a professional who can interpret it alongside other information.'}
  }

  if(band==='18to39'){
    // Young adult norms - the reference population for most published Stroop research.
    // Mean IE ~60-100ms (MacLeod 1991; Frontiers 2014).
    if(ie<=60) return{label:'Elite Control',        color:'#2d9b84',
      desc:'An interference effect below 60ms is exceptional for a young adult. The prefrontal system is suppressing automatic word reading with very high efficiency, consistent with trained inhibitory control.'}
    if(ie<=100)return{label:'Strong Control',       color:'#4DB878',
      desc:'A Stroop interference effect between 60 and 100ms is consistent with healthy young adults in published norms. Selective attention and inhibitory control are both working well.'}
    if(ie<=160)return{label:'Average',              color:'#b88a1a',
      desc:'An interference effect between 100 and 160ms falls within the typical adult range. The Stroop effect is universal and expected. This score reflects normal cognitive processing when competing information is present.'}
    if(ie<=240)return{label:'Elevated Interference',color:'#c97850',
      desc:'An interference effect above 160ms is somewhat higher than the typical young adult norm. Elevated Stroop scores are commonly associated with cognitive load, fatigue, ADHD, and hormonal fluctuation. The system is trainable.'}
    return{label:'High Interference',              color:'#E06287',
      desc:'An interference effect above 240ms is substantially above the young adult norm. Scores at this level are associated with significant cognitive load, TBI, ADHD, and other conditions affecting prefrontal inhibitory control. This is also where the most improvement from targeted practice tends to appear.'}
  }

  if(band==='40to59'){
    // Middle adult norms - IE rises ~20-30ms vs young adult (Cansino et al. 2013;
    // Victoria Stroop norms). Perimenopause context is directly relevant here.
    // Mean IE ~90-130ms for healthy adults in this band.
    if(ie<=80) return{label:'Elite Control',        color:'#2d9b84',
      desc:'An interference effect below 80ms is exceptional at any age and outstanding for the 40-59 range. The prefrontal inhibitory system is working at a high level of efficiency.'}
    if(ie<=130)return{label:'Strong Control',       color:'#4DB878',
      desc:'A Stroop interference effect between 80 and 130ms is strong for adults aged 40-59. Published norms for this group show a mean of roughly 90-130ms, placing this result comfortably within the healthy range.'}
    if(ie<=190)return{label:'Average',              color:'#b88a1a',
      desc:'An interference effect between 130 and 190ms is within the typical range for adults in the 40-59 age group. Natural shifts in processing speed during this period contribute to a wider normal range than in younger adults.'}
    if(ie<=270)return{label:'Elevated Interference',color:'#c97850',
      desc:'An interference effect above 190ms is somewhat higher than the typical 40-59 norm. For women in this age range, hormonal changes during perimenopause are directly associated with elevated Stroop interference. Fatigue, stress, and cognitive load also contribute. These effects are temporary and trainable.'}
    return{label:'High Interference',              color:'#E06287',
      desc:'An interference effect above 270ms is substantially elevated for the 40-59 range. If this persists across sessions, it is worth noting alongside other cognitive symptoms. Perimenopause, ADHD, thyroid changes, and TBI can all produce this pattern.'}
  }

  // 60+ norms - IE rises further with age (Victoria Stroop, Troyer et al. 2006).
  // Mean IE ~120-160ms for healthy older adults. Wider normal range.
  if(ie<=100)return{label:'Elite Control',          color:'#2d9b84',
    desc:'An interference effect below 100ms is exceptional for adults over 60. Age-related changes in processing speed typically widen the interference effect, so a score this low reflects outstanding inhibitory control relative to published norms for this age group.'}
  if(ie<=160)return{label:'Strong Control',         color:'#4DB878',
    desc:'A Stroop interference effect between 100 and 160ms is strong for adults over 60. Published older adult norms from the Victoria Stroop Test (Troyer et al. 2006) show typical performance in the 120-160ms range, placing this result above average.'}
  if(ie<=220)return{label:'Average',                color:'#b88a1a',
    desc:'An interference effect between 160 and 220ms is within the typical range for adults over 60. Some increase in Stroop interference with age is expected and normal. It reflects general processing speed changes rather than pathology.'}
  if(ie<=300)return{label:'Elevated Interference',  color:'#c97850',
    desc:'An interference effect above 220ms is somewhat above the typical older adult range. This level is associated with cognitive load, fatigue, medication effects, and early cognitive changes. Tracking across sessions provides more information than a single result.'}
  return{label:'High Interference',                color:'#E06287',
    desc:'An interference effect above 300ms is substantially elevated even for adults over 60. If this pattern is consistent across sessions, it is worth discussing with a healthcare provider. A single test result is not a diagnosis, but the pattern across sessions can be meaningful.'}
}

function showStreak(n){

const SPARK_COLS=['#6DCDB8','#8BD3E6','#F1B434','#E06287','#407EC9'];
function sparks(el,n=8){
  const deck=$('deck');if(!deck||!el)return;
  const dr=deck.getBoundingClientRect(),r=el.getBoundingClientRect();
  const cx=r.left-dr.left+r.width/2,cy=r.top-dr.top+r.height/2;
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='spark';
    const a=(Math.PI*2/n)*i+(Math.random()-.5)*.7,d=26+Math.random()*34;
    p.style.left=(cx-2.5)+'px';p.style.top=(cy-2.5)+'px';
    p.style.background=SPARK_COLS[i%SPARK_COLS.length];
    p.style.setProperty('--dx',Math.cos(a)*d+'px');p.style.setProperty('--dy',Math.sin(a)*d+'px');
    p.style.animationDelay=(i*.025)+'s';deck.appendChild(p);
    requestAnimationFrame(()=>p.classList.add('go'));setTimeout(()=>p.remove(),700);
  }
}

function jumpTo(idx,dir=1){
  if(transitioning)return;
  const all=document.querySelectorAll('.slide');
  const curr=all[slideIdx],nxt=all[idx];if(!nxt)return;
  transitioning=true;curr.classList.remove('active');
  curr.classList.add(dir>0?'exiting-up':'exiting-down');
  nxt.querySelectorAll('.sg').forEach(el=>{el.style.animation='none';el.offsetHeight;el.style.animation='';});
  nxt.style.transform='translateY('+(dir>0?28:-28)+'px) scale(.98)';nxt.style.opacity='0';
  nxt.classList.add('entering');
  requestAnimationFrame(()=>{nxt.classList.add('active');nxt.style.transform='';nxt.style.opacity='';});
  slideIdx=idx;$('progFill').style.width=(idx/(slides.length-1)*100)+'%';
  setTimeout(()=>{curr.classList.remove('exiting-up','exiting-down');nxt.classList.remove('entering');transitioning=false;},560);
}
function go(dir){jumpTo(slideIdx+dir,dir)}

// ════ GAME ENGINE ════

function startPhase(phIdx){
  gs.phaseIdx=phIdx;gs.trial=0;gs.answered=true;
  gs.streak=0;gs.maxStreak=0;
  gs.gen=(gs.gen||0)+1;
  gs.capturedGen=0;
  // Reset RT/error arrays and phase results so Retry doesn't accumulate stale data
  gs.rts={word:[],colour:[],stroop:[]};
  gs.errors={word:0,colour:0,stroop:0};
  gs.phaseResults=[];
  if(gs.itiTimer){clearTimeout(gs.itiTimer);gs.itiTimer=null;}
  const ph=PHASES[phIdx];
  // Navigate to game slide
  const gameIdx=slides.findIndex(s=>s.t==='game'&&s.i===phIdx);
  const dir=gameIdx>slideIdx?1:-1;
  transitioning=false;
  const all=document.querySelectorAll('.slide');
  all[slideIdx].classList.remove('active');
  all[slideIdx].classList.add(dir>0?'exiting-up':'exiting-down');
  all[gameIdx].style.transform='translateY('+(dir>0?28:-28)+'px) scale(.98)';
  all[gameIdx].style.opacity='0';all[gameIdx].classList.add('entering');
  requestAnimationFrame(()=>{all[gameIdx].classList.add('active');all[gameIdx].style.transform='';all[gameIdx].style.opacity='';});
  const prev=slideIdx;slideIdx=gameIdx;
  $('progFill').style.width=(slideIdx/(slides.length-1)*100)+'%';
  setTimeout(()=>{
    all[prev].classList.remove('exiting-up','exiting-down');
    all[gameIdx].classList.remove('entering');transitioning=false;
    setTimeout(()=>countdown(()=>trial(phIdx)),200);
  },560);
}

function countdown(cb){
  const wrap=$('cntWrap'),el=$('cntN');wrap.classList.add('on');let n=3;
  const tick=()=>{
    el.textContent=n>0?n:'GO';el.style.color=n>0?'var(--text-faint)':'var(--teal)';
    el.className='countdown-n pop';setTimeout(()=>el.className='countdown-n',560);
    if(n===0){setTimeout(()=>{wrap.classList.remove('on');cb();},630);}else{n--;setTimeout(tick,660);}
  };tick();
}

function trial(phIdx){
  const ph=PHASES[phIdx];
  if(gs.trial>=ph.trials){endPhase(phIdx);return;}
  const capturedGen=++gs.gen;
  gs.answered=false;
  const t=genTrial(ph);
  gs.currentTrial=t;
  gs.trialStart=now();
  // Render stimulus
  const wordEl=$('gword'+phIdx);
  if(wordEl){
    wordEl.className='stimulus-word';
    wordEl.style.color=ph.id==='word'?'#E6E7E8':COLOURS[t.inkKey].hex;
    wordEl.textContent=ph.id==='colour'?'XXXX':COLOURS[t.wordKey||t.inkKey].label.toUpperCase();
    wordEl.setAttribute('aria-label',
      ph.id==='word'?`Word: ${COLOURS[t.inkKey].label}`:
      ph.id==='colour'?`Coloured X's, colour is ${COLOURS[t.inkKey].label}`:
      `Word reads ${COLOURS[t.wordKey].label}, ink colour is ${COLOURS[t.inkKey].label}`
    );
  }
  // Update trial counter and progress dot
  const tn=$('gtrial'+phIdx);if(tn)tn.textContent=gs.trial+1;
  updateTrialDots(phIdx,gs.trial,'current');
  // Unlock buttons
  setButtonsLocked(phIdx,false);
  gs.capturedGen=capturedGen;
}

function onColourTap(phIdx,colourKey){
  if(gs.answered||gs.phaseIdx!==phIdx)return;
  if(gs.capturedGen!==gs.gen)return; // stale
  gs.answered=true;
  const rt=Math.round(now()-gs.trialStart);
  const ph=PHASES[phIdx];
  const t=gs.currentTrial;
  // Determine correct answer
  const correctKey=ph.task==='ink'?t.inkKey:t.wordKey||t.inkKey;
  const isCorrect=colourKey===correctKey;
  // Record RT (only for valid responses - applied to appropriate phase array)
  const phaseKey=ph.id;
  gs.rts[phaseKey].push(rt);
  if(!isCorrect)gs.errors[phaseKey]++;
  // Visual feedback on button
  const btn=$(`gbtn${phIdx}_${colourKey}`);
  if(btn){
    btn.classList.add(isCorrect?'btn-correct':'btn-error');
    setTimeout(()=>btn.classList.remove('btn-correct','btn-error'),400);
    if(isCorrect)sparks(btn,5);
  }
  // Stimulus flash out
  const wordEl=$('gword'+phIdx);
  if(wordEl){
    wordEl.classList.add(isCorrect?'flash-correct':'flash-error');
  }
  // Streak
  if(isCorrect){
    gs.streak++;if(gs.streak>gs.maxStreak)gs.maxStreak=gs.streak;
    const sk=$('gstreak'+phIdx);if(sk)sk.textContent=gs.streak;
    showStreak(gs.streak);vib(25);flash('hit');
  }else{
    gs.streak=0;const sk=$('gstreak'+phIdx);if(sk)sk.textContent=0;
    vib([20,30,20]);flash('miss');
  }
  // Lock buttons during ITI
  setButtonsLocked(phIdx,true);
  updateTrialDots(phIdx,gs.trial,isCorrect?'done-correct':'done-error');
  gs.trial++;
  // Inter-trial interval: 400ms
  gs.itiTimer=setTimeout(()=>{
    if(gs.phaseIdx!==phIdx)return;
    const nextWordEl=$('gword'+phIdx);
    if(nextWordEl){nextWordEl.className='stimulus-word';nextWordEl.style.color='transparent';nextWordEl.textContent='...';}
    trial(phIdx);
  },400);
}

function setButtonsLocked(phIdx,locked){
  COLOUR_KEYS.forEach(k=>{
    const btn=$(`gbtn${phIdx}_${k}`);
    if(btn)btn.style.pointerEvents=locked?'none':'';
  });
}

function updateTrialDots(phIdx,trialIdx,state){
  const dot=$('tdot'+phIdx+'_'+trialIdx);
  if(!dot)return;
  dot.className='trial-dot '+state;
}

function endPhase(phIdx){
  if(gs.itiTimer){clearTimeout(gs.itiTimer);gs.itiTimer=null;}
  const ph=PHASES[phIdx];
  const phKey=ph.id;
  const mRT=meanRT(gs.rts[phKey]);
  const total=gs.rts[phKey].length;
  const acc=total?Math.round(((total-gs.errors[phKey])/total)*100):0;
  gs.phaseResults[phIdx]={phaseId:phKey,meanRT:mRT,accuracy:acc,errors:gs.errors[phKey]};
  vib([40,60,80]);
  const resultIdx=slides.findIndex(s=>s.t==='result'&&s.i===phIdx);
  setTimeout(()=>{
    transitioning=false;
    const all=document.querySelectorAll('.slide');
    all[slideIdx].classList.remove('active');all[slideIdx].classList.add('exiting-up');
    all[resultIdx].querySelectorAll('.sg').forEach(el=>{el.style.animation='none';el.offsetHeight;el.style.animation='';});
    all[resultIdx].style.transform='translateY(28px) scale(.98)';all[resultIdx].style.opacity='0';
    all[resultIdx].classList.add('entering');
    requestAnimationFrame(()=>{all[resultIdx].classList.add('active');all[resultIdx].style.transform='';all[resultIdx].style.opacity='';});
    const prev=slideIdx;slideIdx=resultIdx;
    $('progFill').style.width=(slideIdx/(slides.length-1)*100)+'%';
    setTimeout(()=>{
      all[prev].classList.remove('exiting-up');all[resultIdx].classList.remove('entering');
      populateResult(phIdx);
    },560);
  },400);
}


// ── PATTERN INTERPRETER ──
// Reads the three mean RTs and interference score and produces a clinically
// grounded plain-English interpretation of what the pattern means for THIS user.
// Thresholds based on published adult norms:
//   Word reading (Phase 1):  fast < 600ms, slow > 900ms
//   Colour naming (Phase 2): fast < 700ms, slow > 1000ms
//   Interference:            low < 100ms, high > 180ms
function calcPatternNote(mW, mC, mS, ie) {
  // For teens, return a development-framed note rather than clinical pattern analysis
  if(ageBand==='u18'){
    if(ie<=150) return 'Your three scores show a solid profile for a teenager. Word reading at '+mW+'ms, colour naming at '+mC+'ms, and Stroop at '+mS+'ms. The prefrontal pathways that handle interference are still maturing through the mid-20s, so the pattern you see today will naturally shift over time.';
    return 'Interference of '+ie+'ms with word reading at '+mW+'ms and colour naming at '+mC+'ms. Adolescent Stroop performance is more variable than adult performance because the inhibitory control pathways are still developing. A single session tells you where you are today, not where you will be.';
  }
  const fastWord  = mW < 600;
  const slowWord  = mW > 900;
  const fastColour = mC < 700;
  const slowColour = mC > 1000;
  const highIE    = ie > 180;
  const lowIE     = ie <= 100;
  const wordDrivesIt = fastWord && highIE;
  const colourDampensIt = slowColour && !highIE;
  const colourInflatesIt = slowColour && highIE;

  // Pattern 1: Fast reader + high interference - classic strong Stroop effect
  if(wordDrivesIt){
    return 'Your word reading speed was fast ('+mW+'ms), which is the primary driver of your interference score. The more automatic your reading, the stronger the conflict in Round 3. This is the classic Stroop profile. It reflects high reading fluency, not impaired inhibitory control.';
  }
  // Pattern 2: Slow colour naming + elevated IE - baseline may be inflating the score
  if(colourInflatesIt){
    return 'Your colour-naming baseline in Round 2 was slower than average ('+mC+'ms). This raised the denominator in the interference calculation, so part of your '+ie+'ms score reflects slower colour-naming rather than reduced inhibitory control. The two effects are combined in the score.';
  }
  // Pattern 3: Slow colour naming + low/average IE - baseline absorbed the interference
  if(colourDampensIt){
    return 'Your colour-naming baseline (Round 2: '+mC+'ms) was slower than average, which partially absorbed the Stroop interference in the calculation. Your actual inhibitory control under conflict may be stronger than the '+ie+'ms score suggests when colour-naming speed is factored in.';
  }
  // Pattern 4: Low IE - clean suppression
  if(lowIE){
    return 'All three rounds show a tight, efficient profile. Word reading at '+mW+'ms, colour naming at '+mC+'ms, and Stroop at '+mS+'ms. The small gap between Round 2 and Round 3 reflects strong suppression of automatic word reading. The prefrontal inhibitory system is resolving the conflict quickly.';
  }
  // Pattern 5: Balanced average across all three
  if(!highIE && !slowColour && !fastWord){
    return 'Your three scores form a balanced profile. Word reading at '+mW+'ms, colour naming at '+mC+'ms, and Stroop at '+mS+'ms. The '+ie+'ms interference effect sits within the normal adult range and reflects typical competition between automatic reading and deliberate colour naming.';
  }
  // Pattern 6: Slow word reading (unusual) + elevated IE
  if(slowWord && highIE){
    return 'Your word reading was slower than average ('+mW+'ms), which is unusual in the context of a high interference score ('+ie+'ms). This pattern can occur during cognitive fatigue, under high cognitive load, or when attention is divided. It may be worth noting how you felt during the test.';
  }
  // Fallback - general IE-based note
  if(highIE){
    return 'Your Round 2 colour-naming time ('+mC+'ms) and Round 3 Stroop time ('+mS+'ms) produced an interference gap of '+ie+'ms. Elevated interference at this level is associated with cognitive load, fatigue, hormonal fluctuation, ADHD, and TBI. The interference score is sensitive to daily state, so a single session is not a definitive measure.';
  }
  return 'Word reading at '+mW+'ms, colour naming at '+mC+'ms, and Stroop at '+mS+'ms. The '+ie+'ms interference effect is within the expected adult range. Come back for a second session to start tracking changes over time.';
}

function populateResult(phIdx){
  const r=gs.phaseResults[phIdx];if(!r)return;
  const ph=PHASES[phIdx];
  const grade=phIdx===2?scoreGrade(calcInterference(gs.rts.stroop,gs.rts.colour)):null;
  // Grade label (only for Round 3)
  const gl=$('rgrade'+phIdx);
  if(gl){
    if(grade){gl.textContent=grade.label;gl.style.color=grade.color;}
    else{
      const labels=['Baseline established','Baseline established',''][phIdx];
      gl.textContent=labels;gl.style.color='var(--text-dim)';
    }
  }
  const rt=$('rrt'+phIdx);if(rt){rt.textContent=r.meanRT;rt.style.color='var(--text)';}
  const ac=$('racc'+phIdx);if(ac){ac.innerHTML=r.accuracy+'<span style="font-size:.7rem;color:var(--text-faint)">%</span>';}
  const er=$('rerr'+phIdx);if(er){er.textContent=r.errors;er.style.color=r.errors>3?'var(--pink)':'var(--text)';}
  // Round 3: interference ring + RT bars + benchmark
  if(phIdx===2){
    const ie=calcInterference(gs.rts.stroop,gs.rts.colour);
    const gr=scoreGrade(ie);
    // Ring - map IE to 0-100 scale (0ms=100%, 300ms+=0%)
    const ringPct=clamp(Math.round((1-ie/300)*100),5,100);
    const CIRC=2*Math.PI*70; // r=70
    const arc=$('rarc'+phIdx);
    if(arc){arc.style.stroke=gr.color;setTimeout(()=>{arc.style.strokeDashoffset=(CIRC*(1-ringPct/100)).toFixed(2);},120);}
    const ne=$('rnum'+phIdx);if(ne){ne.textContent=ie;ne.style.color=gr.color;}
    if(gl){gl.textContent=gr.label;gl.style.color=gr.color;}
    // RT bars
    const mW=meanRT(gs.rts.word),mC=meanRT(gs.rts.colour),mS=meanRT(gs.rts.stroop);
    const maxRT=Math.max(mW,mC,mS,1);
    setTimeout(()=>{
      [['word',mW],['colour',mC],['stroop',mS]].forEach(([k,v])=>{
        const bar=$('rtbar_'+k),val=$('rtval_'+k);
        if(bar)bar.style.transform='scaleX('+(v/maxRT)+')';
        if(val)val.textContent=v+'ms';
      });
    },300);
    // Pattern interpretation
    const patternNote=calcPatternNote(mW,mC,mS,ie);
    const pi=$('patternInterp'),pit=$('patternInterpTxt');
    if(pi&&pit){pit.textContent=patternNote;pi.style.display='block';}
    // Benchmark marker - map IE (0-300) to left% position (left=low IE=good)
    const markerPct=clamp(Math.round((ie/300)*100),2,97);
    const marker=$('benchmarker');
    if(marker){marker.style.left=markerPct+'%';marker.style.background=gr.color;marker.style.color=gr.color;setTimeout(()=>marker.classList.add('placed'),550);}
    const callout=$('benchcallout');
    if(callout){callout.style.borderColor=gr.color+'33';callout.style.boxShadow='inset 3px 0 0 0 '+gr.color;}
    const ze=$('benchzone');if(ze){ze.textContent=gr.label;ze.style.color=gr.color;}
    const te=$('benchtext');if(te)te.textContent=gr.desc;
    // Update benchmark source citation to match age band
    const bsrc=$('benchsource');
    if(bsrc){
      const srcs={u18:'Developmental norms (ages 8-17)',
                  '18to39':'MacLeod (1991) · Frontiers (2014)',
                  '40to59':'Cansino et al. (2013) · Victoria Stroop',
                  '60plus':'Troyer et al. (2006) · Victoria Stroop norms'};
      bsrc.textContent=srcs[ageBand||'18to39']||srcs['18to39'];
    }
  }
  // Action buttons
  const act=$('ract'+phIdx);
  if(act){
    if(phIdx<PHASES.length-1){
      act.innerHTML=`<button class="btn-primary" onclick="sparks(this);setTimeout(()=>toPCard(${phIdx+1}),100)">Round ${phIdx+2} <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 2l5 5-5 5"/></svg></button><button class="btn-ghost" onclick="sparks(this);setTimeout(()=>startPhase(${phIdx}),100)">Retry</button>`;
    }else{
      act.innerHTML=`<button class="btn-primary" onclick="sparks(this);setTimeout(doFinal,100)">Final Score <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 2l5 5-5 5"/></svg></button><button class="btn-ghost" onclick="sparks(this);setTimeout(()=>startPhase(${phIdx}),100)">Retry</button>`;
    }
  }
}

function toPCard(phIdx){
  const ci=slides.findIndex(s=>s.t==='pcard'&&s.i===phIdx);transitioning=false;jumpTo(ci,1);
}

function doFinal(){
  const fi=slides.findIndex(s=>s.t==='final');transitioning=false;jumpTo(fi,1);
  setTimeout(()=>{
    const ie=calcInterference(gs.rts.stroop,gs.rts.colour);
    const gr=scoreGrade(ie);
    histCommit(ie,gs.phaseResults);
    const fb=$('fbig');if(fb){fb.textContent=ie;fb.style.color=gr.color;}
    const fc=$('fchips');
    if(fc){
      const mW=meanRT(gs.rts.word),mC=meanRT(gs.rts.colour),mS=meanRT(gs.rts.stroop);
      fc.innerHTML=[
        `<span class="chip">Word: ${mW}ms</span>`,
        `<span class="chip">Colour: ${mC}ms</span>`,
        `<span class="chip${ie<=100?' good':''}">Interference: ${ie}ms</span>`
      ].join('');
    }
    renderFinalHistory(ie,gs.phaseResults);
    const fi2=$('finsights');
    if(fi2){
      const lines=ie<=100
        ?['Strong inhibitory control. The prefrontal system is resolving the conflict between word reading and colour naming quickly and efficiently.','A low interference effect means your brain is suppressing the automatic reading response without much delay.','Regular practice can push this further by reinforcing the anterior cingulate cortex pathway that handles competing inputs.']
        :ie<=180
        ?['An average Stroop effect reflects typical executive function under conflict conditions','The brain resolved the competition between reading and colour naming within the normal range','Repeated Stroop practice reduces interference by strengthening selective attention pathways']
        :['A higher Stroop interference effect is common during periods of cognitive load, fatigue, hormonal fluctuation, TBI recovery, and with ADHD.','Interference control responds well to targeted training. The prefrontal pathways involved are among the most adaptable in the adult brain.','Come back regularly and track the number. Improvement tends to be visible within a few sessions.'];
      fi2.innerHTML=lines.map(l=>`<li>${l}</li>`).join('');
    }
  },620);
}

// ════ SESSION HISTORY ════
const HIST_KEY='brainnovation_stroop_v1';
const HIST_MAX=3;
function histLoad(){try{const r=localStorage.getItem(HIST_KEY);if(!r)return[];const p=JSON.parse(r);return Array.isArray(p)?p:[];}catch(e){return[];}}
function histSave(s){try{localStorage.setItem(HIST_KEY,JSON.stringify(s));}catch(e){}}
function histCommit(ie,phaseResults){
  const prev=histLoad();
  const entry={
    ts:Date.now(),
    overall:ie,
    band:ageBand||'18to39',
    phases:phaseResults.map(r=>r?r.meanRT:null),
    accuracy:phaseResults.map(r=>r?r.accuracy:null)
  };
  histSave([entry,...prev].slice(0,HIST_MAX));
}
function histFormatDate(ts){if(!ts)return'';const d=new Date(ts),now=new Date(),diff=Math.floor((now-d)/86400000);if(diff===0)return'Today';if(diff===1)return'Yesterday';if(diff<7)return diff+'d ago';return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});}
function histTrendArrow(curr,prev){
  if(prev==null)return null;
  const diff=curr-prev;
  // For interference: LOWER is better, so improvement = negative diff
  if(Math.abs(diff)<5)return{dir:'flat',label:'\u2192 Same',cls:''};
  if(diff<0)return{dir:'up',label:'\u2191 -'+Math.abs(diff)+'ms improved',cls:'up'};
  return{dir:'down',label:'\u2193 +'+diff+'ms worse',cls:'down'};
}
function histAnalysis(sessions){
  // Generate a plain-English interpretation of score trajectory across sessions.
  // sessions[0] is current (lowest index = most recent).
  // For interference: LOWER = better.
  if(sessions.length<2)return null;
  const curr=sessions[0].overall;
  const prev=sessions[1].overall;
  const diff=curr-prev; // negative = improvement
  const absDiff=Math.abs(diff);
  const improved=diff<0;
  const flat=absDiff<5;
  // Three-session trajectory
  let trajectory=null;
  if(sessions.length>=3){
    const s0=sessions[0].overall,s1=sessions[1].overall,s2=sessions[2].overall;
    const d1=s1-s2; // older change
    const d0=s0-s1; // recent change
    if(d0<-5&&d1<-5)trajectory='Consistent improvement across all three sessions. The prefrontal inhibitory pathway is responding to practice.';
    else if(d0>5&&d1>5)trajectory='Scores have risen across all three sessions. Elevated interference is often tied to cumulative fatigue or cognitive load rather than a change in underlying capacity.';
    else if(d0<-5&&d1>5)trajectory='A meaningful improvement after a higher session. Recovery and practice both contribute to this pattern.';
    else if(d0>5&&d1<-5)trajectory='A slight rise after a strong session. This is common as the brain consolidates gains from the previous session.';
    else trajectory='Scores have been relatively stable across three sessions. This is a valid baseline from which targeted practice can produce measurable movement.';
  }
  // Single-session change narrative
  let changeNote;
  if(flat){
    changeNote='Your interference score is essentially the same as last session. Stability at a score level is normal and often precedes a step-change with continued practice.';
  }else if(improved){
    if(absDiff>=50)changeNote=`A substantial improvement of ${absDiff}ms. A change of this size reflects a real shift in inhibitory efficiency, not just normal session-to-session variation.`;
    else if(absDiff>=20)changeNote=`An improvement of ${absDiff}ms since last time. Changes of this magnitude are meaningful and consistent with strengthening prefrontal control.`;
    else changeNote=`A small improvement of ${absDiff}ms. Small gains are meaningful when they accumulate across sessions.`;
  }else{
    if(absDiff>=50)changeNote=`A notable increase of ${absDiff}ms. Interference scores can rise sharply with fatigue, stress, hormonal shifts, or cognitive load. It does not reflect a permanent change in capacity.`;
    else if(absDiff>=20)changeNote=`An increase of ${absDiff}ms since last session. This is within the range explained by daily cognitive state rather than a change in underlying inhibitory control.`;
    else changeNote=`A small increase of ${absDiff}ms. This level of variation is normal across sessions.`;
  }
  return{changeNote,trajectory};
}

function renderFinalHistory(currentIE,currentPhases){
  const container=$('histfinal');if(!container)return;
  const history=histLoad();
  const prev_sessions=history.slice(0,HIST_MAX-1).map(s=>({...s,isCurrent:false}));
  const displaySessions=[{ts:Date.now(),overall:currentIE,phases:currentPhases.map(r=>r?r.meanRT:null),isCurrent:true},...prev_sessions];
  if(displaySessions.length<2){
    container.innerHTML=
      '<p class="hist-final-title">Session History</p>'+
      '<p class="hist-no-history">Complete a second session to start seeing your history and score change analysis here.</p>';
    return;
  }
  const prev=displaySessions[1];
  const trend=histTrendArrow(currentIE,prev.overall);
  const trendHtml=trend?`<div class="hist-trend-badge ${trend.cls}">${trend.label} since last session</div>`:'';
  // Score change analysis
  const analysis=histAnalysis(displaySessions);
  let analysisHtml='';
  if(analysis){
    analysisHtml=`<div class="hist-analysis-wrap">`;
    analysisHtml+=`<p class="hist-analysis-label">What changed</p>`;
    analysisHtml+=`<p class="hist-analysis-text">${analysis.changeNote}</p>`;
    if(analysis.trajectory){
      analysisHtml+=`<p class="hist-analysis-text" style="margin-top:.45rem">${analysis.trajectory}</p>`;
    }
    analysisHtml+=`</div>`;
  }
  // Session rows
  const phLabels=['Word','Colour','Stroop'];
  const rows=displaySessions.map(s=>{
    const phaseChips=phLabels.map((l,li)=>{
      const rt=s.phases&&s.phases[li]!=null?s.phases[li]:null;
      if(rt==null)return`<span class="hist-ph-chip">${l}: n/a</span>`;
      // Good threshold: Stroop RT good if close to colour RT (low interference)
      const isGood=li===2&&rt<=500;
      return`<span class="hist-ph-chip${isGood?' good':''}">${l}: ${rt}ms</span>`;
    }).join('');
    const gr=scoreGrade(s.overall);
    return`<div class="hist-session-row${s.isCurrent?' is-current':''}">
      <div class="hist-row-top">
        <span class="hist-row-score" style="color:${gr.color}">${s.overall}ms</span>
        <div class="hist-row-meta">
          <span class="hist-row-date">${histFormatDate(s.ts)}</span>
          <span class="hist-row-tag ${s.isCurrent?'now':'prev'}">${s.isCurrent?'This session':'Previous'}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.3rem;">
        <div class="hist-phase-chips">${phaseChips}</div>
        <span class="hist-grade-chip" style="color:${gr.color};font-size:.58rem;font-weight:600;letter-spacing:.06em;">${gr.label}</span>
      </div>
    </div>`;
  }).join('');
  container.innerHTML=
    '<p class="hist-final-title">Session History</p>'+
    trendHtml+
    rows+
    analysisHtml;
}

document.addEventListener('visibilitychange',function(){
  if(document.hidden&&gs.itiTimer){
    clearTimeout(gs.itiTimer);gs.itiTimer=null;
    // Mark current trial as needing restart
    if(!gs.answered){gs.answered=true;}
  }
});

buildSlides();
$('progFill').style.width='0%';
